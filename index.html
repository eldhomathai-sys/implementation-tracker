<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementation Tracker Dashboard</title>
<style>
/* ── Reset & base ─────────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f1f5f9;color:#1e293b;min-height:100vh;}
a{color:inherit;text-decoration:none;}

/* ── Layout ───────────────────────────────────────────────── */
.topbar{background:#1e293b;color:#fff;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:0.02em;}
.topbar-meta{font-size:12px;color:#94a3b8;display:flex;align-items:center;gap:16px;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;margin-right:5px;}

.page{max-width:1280px;margin:0 auto;padding:24px 28px;}
.section-title{font-size:13px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:12px;}

/* ── KPI cards ────────────────────────────────────────────── */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:28px;}
.kpi{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:16px 18px;}
.kpi-label{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:500;}
.kpi-val{font-size:28px;font-weight:700;color:#1e293b;line-height:1;}
.kpi-sub{font-size:11px;color:#94a3b8;margin-top:4px;}
.kpi.danger .kpi-val{color:#dc2626;}
.kpi.success .kpi-val{color:#16a34a;}
.kpi.warn .kpi-val{color:#d97706;}
.kpi.info .kpi-val{color:#2563eb;}

/* ── Pipeline bar ─────────────────────────────────────────── */
.pipeline{background:#fff;border-radius:10px;border:1px solid #e2e8f0;padding:18px 20px;margin-bottom:28px;}
.pipeline-stages{display:flex;gap:6px;margin-top:12px;flex-wrap:wrap;}
.ps{flex:1;min-width:80px;text-align:center;padding:8px 6px;border-radius:7px;font-size:12px;font-weight:600;cursor:pointer;transition:opacity 0.15s;}
.ps:hover{opacity:0.8;}
.ps-count{font-size:20px;font-weight:700;display:block;margin-bottom:2px;}
.ps-label{font-size:10px;font-weight:500;line-height:1.2;}

/* ── Filter bar ───────────────────────────────────────────── */
.filters{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap;}
.filter-btn{padding:6px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;font-size:12px;font-weight:500;cursor:pointer;color:#475569;transition:all 0.15s;}
.filter-btn:hover{border-color:#94a3b8;}
.filter-btn.active{background:#1e293b;color:#fff;border-color:#1e293b;}
.search-input{flex:1;min-width:200px;max-width:300px;padding:7px 14px;border-radius:20px;border:1.5px solid #e2e8f0;font-size:13px;background:#fff;color:#1e293b;outline:none;}
.search-input:focus{border-color:#2563eb;}

/* ── Customer cards grid ──────────────────────────────────── */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;}
.card{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:16px;cursor:pointer;transition:border-color 0.15s,box-shadow 0.15s;}
.card:hover{border-color:#94a3b8;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card.high-risk{border-left:3px solid #dc2626;}
.card.on-hold{opacity:0.7;border-style:dashed;}
.card.churned{opacity:0.5;}

.card-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0;}
.card-name{font-size:14px;font-weight:600;color:#1e293b;line-height:1.3;}
.card-sub{font-size:11px;color:#64748b;margin-top:1px;}
.stage-badge{font-size:10px;padding:3px 9px;border-radius:20px;font-weight:600;white-space:nowrap;margin-left:auto;flex-shrink:0;}

.prog-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.prog-bar{flex:1;height:5px;background:#e2e8f0;border-radius:3px;overflow:hidden;}
.prog-fill{height:100%;border-radius:3px;transition:width 0.4s;}
.prog-pct{font-size:11px;color:#64748b;min-width:30px;text-align:right;}

.stage-track{display:flex;gap:2px;margin-bottom:10px;}
.st-pip{flex:1;height:4px;border-radius:2px;}

.card-meta{display:flex;justify-content:space-between;font-size:11px;color:#94a3b8;}
.risk-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-right:3px;vertical-align:middle;}
.card-note{font-size:11px;color:#94a3b8;margin-top:8px;padding-top:8px;border-top:1px solid #f1f5f9;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.loc-badge{display:inline-flex;align-items:center;gap:3px;font-size:10px;color:#2563eb;background:#eff6ff;border-radius:4px;padding:2px 6px;}

/* ── Detail drawer ────────────────────────────────────────── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;}
.overlay.open{display:block;}
.drawer{position:fixed;top:0;right:-640px;width:640px;max-width:95vw;height:100vh;background:#fff;z-index:101;overflow-y:auto;transition:right 0.3s ease;border-left:1px solid #e2e8f0;}
.drawer.open{right:0;}
.drawer-hdr{padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;}
.drawer-close{width:32px;height:32px;border-radius:8px;border:1px solid #e2e8f0;background:transparent;cursor:pointer;font-size:18px;color:#64748b;display:flex;align-items:center;justify-content:center;}
.drawer-body{padding:24px;}

.drawer-kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.dkpi{background:#f8fafc;border-radius:8px;padding:12px;text-align:center;}
.dkpi-label{font-size:10px;color:#64748b;margin-bottom:4px;}
.dkpi-val{font-size:20px;font-weight:700;color:#1e293b;}

.drawer-section{margin-bottom:20px;}
.drawer-section h4{font-size:12px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;}

.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.info-item{background:#f8fafc;border-radius:8px;padding:10px 12px;}
.info-label{font-size:10px;color:#94a3b8;margin-bottom:2px;}
.info-val{font-size:13px;font-weight:500;color:#1e293b;}

/* Stage pipeline in drawer */
.stage-pipeline{display:flex;align-items:center;gap:0;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;}
.sp-item{display:flex;flex-direction:column;align-items:center;min-width:72px;}
.sp-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid #e2e8f0;background:#f8fafc;color:#94a3b8;}
.sp-dot.done{background:#16a34a;border-color:#16a34a;color:#fff;}
.sp-dot.current{border-color:#2563eb;color:#2563eb;background:#eff6ff;}
.sp-label{font-size:9px;color:#94a3b8;text-align:center;margin-top:4px;line-height:1.2;max-width:68px;}
.sp-label.current{color:#2563eb;font-weight:600;}
.sp-line{flex:1;height:2px;background:#e2e8f0;min-width:10px;align-self:center;margin-bottom:20px;}
.sp-line.done{background:#16a34a;}

/* Tasks table in drawer */
.task-table{width:100%;border-collapse:collapse;font-size:12px;}
.task-table th{text-align:left;padding:6px 10px;background:#f8fafc;color:#64748b;font-size:11px;font-weight:600;border-bottom:1px solid #e2e8f0;}
.task-table td{padding:8px 10px;border-bottom:1px solid #f1f5f9;vertical-align:top;}
.task-table tr:last-child td{border-bottom:none;}
.task-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;}

/* Notes in drawer */
.note-item{background:#fafafa;border-radius:8px;padding:12px;margin-bottom:8px;border-left:3px solid #e2e8f0;}
.note-meta{font-size:10px;color:#94a3b8;margin-bottom:4px;display:flex;gap:12px;}
.note-stage-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:9px;font-weight:600;}
.note-text{font-size:12px;color:#334155;line-height:1.5;}

/* ── Loading / error states ───────────────────────────────── */
.loading{text-align:center;padding:60px;color:#94a3b8;font-size:14px;}
.spinner{width:32px;height:32px;border:3px solid #e2e8f0;border-top-color:#2563eb;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px;}
@keyframes spin{to{transform:rotate(360deg);}}
.error-box{background:#fee2e2;border:1px solid #fca5a5;border-radius:10px;padding:16px;color:#991b1b;font-size:13px;margin:20px 0;}

/* ── Responsive ───────────────────────────────────────────── */
@media(max-width:640px){
  .page{padding:16px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .pipeline-stages{gap:4px;}
  .ps{min-width:60px;}
  .cards-grid{grid-template-columns:1fr;}
  .drawer{width:100%;max-width:100%;}
  .drawer-kpis{grid-template-columns:repeat(2,1fr);}
  .info-grid{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">Implementation Tracker Dashboard</div>
  <div class="topbar-meta">
    <span id="sync-status"><span class="sync-dot"></span>Loading…</span>
    <span id="last-sync"></span>
  </div>
</div>

<div class="page">

  <!-- KPIs -->
  <div class="section-title">Overview</div>
  <div class="kpi-grid" id="kpi-grid">
    <div class="loading"><div class="spinner"></div>Fetching data…</div>
  </div>

  <!-- Pipeline -->
  <div class="pipeline">
    <div class="section-title" style="margin-bottom:0;">Customers by stage</div>
    <div class="pipeline-stages" id="pipeline-stages"></div>
  </div>

  <!-- Filters -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
    <button class="filter-btn" onclick="setFilter('active',this)">Active</button>
    <button class="filter-btn" onclick="setFilter('high-risk',this)">High Risk</button>
    <button class="filter-btn" onclick="setFilter('on-hold',this)">On Hold</button>
    <button class="filter-btn" onclick="setFilter('churned',this)">Churned</button>
    <input class="search-input" type="text" id="search-input" placeholder="Search by account or POC…" oninput="renderCards()">
  </div>

  <!-- Cards -->
  <div class="section-title" id="cards-count">Customers</div>
  <div class="cards-grid" id="cards-grid"></div>
</div>

<!-- Detail drawer -->
<div class="overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-hdr">
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="avatar" id="d-avatar" style="width:44px;height:44px;font-size:16px;"></div>
      <div>
        <div id="d-name" style="font-size:16px;font-weight:700;color:#1e293b;"></div>
        <div id="d-sub" style="font-size:12px;color:#64748b;margin-top:2px;"></div>
      </div>
    </div>
    <button class="drawer-close" onclick="closeDrawer()">&#x2715;</button>
  </div>
  <div class="drawer-body" id="drawer-body"></div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG — https://script.google.com/macros/s/AKfycbwosvI8siAqnPCAGCEVLFykTQWwpRUKRLKsrlQRIkwEEzkJG3UfRhy31j1EPtBZqYIP/exec
// ══════════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwosvI8siAqnPCAGCEVLFykTQWwpRUKRLKsrlQRIkwEEzkJG3UfRhy31j1EPtBZqYIP/exec
// ── Stage definitions ─────────────────────────────────────────
const STAGES = [
  "Awaiting Intake","Kickoff","Questionnaire Review","Configuration",
  "QA Testing","Pre Go-Live Testing","Live","Post Go-Live"
];
const ALL_STAGES = [...STAGES, "On Hold", "Churned"];

const STAGE_STYLE = {
  "Awaiting Intake":      {bg:"#f1f5f9", color:"#475569"},
  "Kickoff":              {bg:"#dbeafe", color:"#1d4ed8"},
  "Questionnaire Review": {bg:"#ede9fe", color:"#5b21b6"},
  "Configuration":        {bg:"#ccfbf1", color:"#0f766e"},
  "QA Testing":           {bg:"#fef3c7", color:"#b45309"},
  "Pre Go-Live Testing":  {bg:"#ffedd5", color:"#c2410c"},
  "Live":                 {bg:"#dcfce7", color:"#15803d"},
  "Post Go-Live":         {bg:"#d1fae5", color:"#065f46"},
  "On Hold":              {bg:"#fef9c3", color:"#92400e"},
  "Churned":              {bg:"#fee2e2", color:"#991b1b"},
};

const AVATAR_COLORS = [
  {bg:"#dbeafe",color:"#1d4ed8"},{bg:"#ede9fe",color:"#5b21b6"},
  {bg:"#ccfbf1",color:"#0f766e"},{bg:"#fef3c7",color:"#b45309"},
  {bg:"#ffedd5",color:"#c2410c"},{bg:"#fce7f3",color:"#9d174d"},
  {bg:"#dcfce7",color:"#15803d"},{bg:"#fee2e2",color:"#991b1b"},
];

const RISK_COLOR = {Low:"#16a34a", Medium:"#d97706", High:"#dc2626"};

// ── State ─────────────────────────────────────────────────────
let customers=[], tasks=[], notes=[], currentFilter="all", currentCustomer=null;

// ── Helpers ───────────────────────────────────────────────────
function initials(name){return name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();}
function avatarStyle(idx){const c=AVATAR_COLORS[idx%AVATAR_COLORS.length];return `background:${c.bg};color:${c.color};`;}
function stageIndex(s){return STAGES.indexOf(s);}
function custProgress(name){
  const tt=tasks.filter(t=>t["Account Name"]===name);
  if(!tt.length) return 0;
  const done=tt.filter(t=>t["Status"]==="Done").length;
  return Math.round(done/tt.length*100);
}
function custTasks(name){return tasks.filter(t=>t["Account Name"]===name);}
function custNotes(name){return notes.filter(n=>n["Account Name"]===name);}
function fmtDate(d){if(!d||d==="—")return "—";try{const dt=new Date(d);return dt.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"});}catch{return d;}}

// ── Fetch data ────────────────────────────────────────────────
async function fetchAll(){
  try{
    const [cr, tr, nr] = await Promise.all([
      fetch(APPS_SCRIPT_URL).then(r=>r.json()),
      fetch(APPS_SCRIPT_URL+"?action=tasks").then(r=>r.json()),
      fetch(APPS_SCRIPT_URL+"?action=notes").then(r=>r.json()),
    ]);
    customers = cr.customers || [];
    tasks     = tr.tasks     || [];
    notes     = nr.notes     || [];
    document.getElementById("sync-status").innerHTML = '<span class="sync-dot"></span>Live';
    document.getElementById("last-sync").textContent = "Updated "+new Date().toLocaleTimeString();
    render();
  } catch(e){
    document.getElementById("kpi-grid").innerHTML = `<div class="error-box">Could not load data. Check your Apps Script URL is correctly set in index.html.<br><small>${e.message}</small></div>`;
    document.getElementById("sync-status").innerHTML = '<span class="sync-dot" style="background:#dc2626"></span>Error';
  }
}

// ── Render KPIs ───────────────────────────────────────────────
function renderKPIs(){
  const active   = customers.filter(c=>c["On Hold"]!=="Yes"&&c["Churned"]!=="Yes");
  const onHold   = customers.filter(c=>c["On Hold"]==="Yes");
  const churned  = customers.filter(c=>c["Churned"]==="Yes");
  const highRisk = active.filter(c=>c["Risk Level"]==="High");
  const live     = active.filter(c=>["Live","Post Go-Live"].includes(c["Current Stage"]));
  const totalLoc = active.reduce((s,c)=>s+(parseInt(c["No. of Locations"])||0),0);
  document.getElementById("kpi-grid").innerHTML = `
    <div class="kpi"><div class="kpi-label">Total customers</div><div class="kpi-val">${customers.length}</div></div>
    <div class="kpi info"><div class="kpi-label">Active</div><div class="kpi-val">${active.length}</div></div>
    <div class="kpi success"><div class="kpi-label">Live / Post go-live</div><div class="kpi-val">${live.length}</div></div>
    <div class="kpi danger"><div class="kpi-label">High risk</div><div class="kpi-val">${highRisk.length}</div></div>
    <div class="kpi warn"><div class="kpi-label">On hold</div><div class="kpi-val">${onHold.length}</div></div>
    <div class="kpi"><div class="kpi-label">Churned</div><div class="kpi-val">${churned.length}</div></div>
    <div class="kpi info"><div class="kpi-label">Total locations</div><div class="kpi-val">${totalLoc}</div></div>
    <div class="kpi"><div class="kpi-label">Open tasks</div><div class="kpi-val">${tasks.filter(t=>t["Status"]!=="Done").length}</div></div>
  `;
}

// ── Render pipeline bar ───────────────────────────────────────
function renderPipeline(){
  const el = document.getElementById("pipeline-stages");
  el.innerHTML = ALL_STAGES.map(stage=>{
    const count = customers.filter(c=>c["Current Stage"]===stage).length;
    const st = STAGE_STYLE[stage]||{bg:"#f1f5f9",color:"#475569"};
    return `<div class="ps" style="background:${st.bg};color:${st.color}" onclick="filterByStage('${stage}')">
      <span class="ps-count">${count}</span>
      <span class="ps-label">${stage}</span>
    </div>`;
  }).join("");
}

// ── Render cards ──────────────────────────────────────────────
function renderCards(){
  const search = document.getElementById("search-input").value.toLowerCase();
  let filtered = customers.filter(c=>{
    if(currentFilter==="active"    && (c["On Hold"]==="Yes"||c["Churned"]==="Yes")) return false;
    if(currentFilter==="high-risk" && c["Risk Level"]!=="High") return false;
    if(currentFilter==="on-hold"   && c["On Hold"]!=="Yes") return false;
    if(currentFilter==="churned"   && c["Churned"]!=="Yes") return false;
    if(currentFilter.startsWith("stage:")&&c["Current Stage"]!==currentFilter.slice(6)) return false;
    if(search&&!((c["Account Name"]||"").toLowerCase().includes(search))
              &&!((c["POC Name"]||"").toLowerCase().includes(search))
              &&!((c["Industry"]||"").toLowerCase().includes(search))) return false;
    return true;
  });
  document.getElementById("cards-count").textContent = `${filtered.length} customer${filtered.length!==1?"s":""}`;
  if(!filtered.length){
    document.getElementById("cards-grid").innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:40px;color:#94a3b8;">No customers match this filter.</div>`;
    return;
  }
  document.getElementById("cards-grid").innerHTML = filtered.map((c,i)=>{
    const idx = customers.indexOf(c);
    const stage  = c["Current Stage"]||"Awaiting Intake";
    const st     = STAGE_STYLE[stage]||{bg:"#f1f5f9",color:"#475569"};
    const prog   = custProgress(c["Account Name"]);
    const risk   = c["Risk Level"]||"Low";
    const onHold = c["On Hold"]==="Yes";
    const churned= c["Churned"]==="Yes";
    const locs   = c["No. of Locations"]||0;
    const note   = c["Customer Notes"]||"";
    const cardClass = `card${risk==="High"?" high-risk":""}${onHold?" on-hold":""}${churned?" churned":""}`;
    const stageIdx = stageIndex(stage);
    const pipPills = STAGES.map((_,si)=>`<div class="st-pip" style="background:${si<=stageIdx?"#2563eb":"#e2e8f0"}"></div>`).join("");
    const glDate = fmtDate(c["Go-Live Date"]);
    return `<div class="${cardClass}" onclick="openDrawer(${idx})">
      <div class="card-hdr">
        <div class="avatar" style="${avatarStyle(idx)}">${initials(c["Account Name"]||"?")}</div>
        <div style="flex:1;min-width:0;">
          <div class="card-name">${c["Account Name"]||"—"}</div>
          <div class="card-sub">${c["POC Name"]||""} · ${c["Industry"]||""}</div>
        </div>
        <span class="stage-badge" style="background:${st.bg};color:${st.color}">${stage}</span>
      </div>
      <div class="prog-row">
        <div class="prog-bar"><div class="prog-fill" style="width:${prog}%;background:${st.color}"></div></div>
        <span class="prog-pct">${prog}%</span>
      </div>
      <div class="stage-track">${pipPills}</div>
      <div class="card-meta">
        <span><span class="risk-dot" style="background:${RISK_COLOR[risk]||"#94a3b8"}"></span>${risk} risk
          ${locs?` · <span class="loc-badge">${locs} location${locs>1?"s":""}</span>`:""}
        </span>
        <span>${glDate!=="—"?"Go-live: "+glDate:onHold?"On hold":churned?"Churned":""}</span>
      </div>
      ${note?`<div class="card-note">${note}</div>`:""}
    </div>`;
  }).join("");
}

// ── Filter helpers ────────────────────────────────────────────
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  renderCards();
}
function filterByStage(stage){
  currentFilter="stage:"+stage;
  document.querySelectorAll(".filter-btn").forEach(b=>b.classList.remove("active"));
  renderCards();
}

// ── Drawer ────────────────────────────────────────────────────
function openDrawer(idx){
  currentCustomer=idx;
  const c=customers[idx];
  const stage=c["Current Stage"]||"Awaiting Intake";
  const stIdx=stageIndex(stage);
  const risk=c["Risk Level"]||"Low";
  const locs=c["No. of Locations"]||0;
  const prog=custProgress(c["Account Name"]);
  const tt=custTasks(c["Account Name"]);
  const nn=custNotes(c["Account Name"]);
  const done=tt.filter(t=>t["Status"]==="Done").length;
  const open=tt.filter(t=>t["Status"]!=="Done").length;
  const overdue=tt.filter(t=>{
    if(t["Status"]==="Done"||!t["Due Date"]) return false;
    return new Date(t["Due Date"])<new Date();
  }).length;

  // Header avatar
  const av=document.getElementById("d-avatar");
  av.textContent=initials(c["Account Name"]||"?");
  av.style.cssText=avatarStyle(idx)+"width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;";
  document.getElementById("d-name").textContent=c["Account Name"]||"—";
  document.getElementById("d-sub").textContent=`${c["POC Name"]||""} · ${c["Industry"]||""} · ${locs} location${locs!==1?"s":""}`;

  // Stage pipeline
  const pipelineHTML = STAGES.map((s,si)=>{
    const isDone = si<stIdx;
    const isCurr = si===stIdx;
    const lineClass = si<stIdx?"done":"";
    const dotClass  = isDone?"done":isCurr?"current":"";
    const lblClass  = isCurr?"current":"";
    const part = `<div class="sp-item">
      <div class="sp-dot ${dotClass}">${isDone?"✓":si+1}</div>
      <div class="sp-label ${lblClass}">${s}</div>
    </div>`;
    return si<STAGES.length-1?part+`<div class="sp-line ${lineClass}"></div>`:part;
  }).join("");

  // Task status badge
  function tsBadge(status){
    const map={
      "Done":        "background:#dcfce7;color:#15803d",
      "In Progress": "background:#dbeafe;color:#1d4ed8",
      "Not Started": "background:#f1f5f9;color:#475569",
      "Blocked":     "background:#fee2e2;color:#991b1b",
      "On Hold":     "background:#fef3c7;color:#b45309",
    };
    return `<span class="task-status" style="${map[status]||""}">${status}</span>`;
  }

  // Tasks table
  const taskRows = tt.length ? tt.map(t=>`
    <tr>
      <td style="font-weight:500;color:#1e293b;">${t["Task Name"]||""}</td>
      <td>${t["Stage"]||""}</td>
      <td>${tsBadge(t["Status"]||"")}</td>
      <td style="color:#64748b;">${fmtDate(t["Due Date"])}</td>
      <td style="color:#94a3b8;font-size:11px;">${t["Task Notes"]||""}</td>
    </tr>`).join("") : `<tr><td colspan="5" style="text-align:center;color:#94a3b8;padding:16px;">No tasks logged yet.</td></tr>`;

  // Notes
  const notesHTML = nn.length ? nn.map(n=>{
    const nst=STAGE_STYLE[n["Stage"]]||{bg:"#f1f5f9",color:"#475569"};
    return `<div class="note-item" style="border-left-color:${nst.color}">
      <div class="note-meta">
        <span class="note-stage-tag" style="background:${nst.bg};color:${nst.color}">${n["Stage"]||""}</span>
        <span>${fmtDate(n["Date"])}</span>
        <span>${n["Author"]||""}</span>
      </div>
      <div class="note-text">${n["Notes / Observations"]||""}</div>
    </div>`;
  }).join("") : `<div style="color:#94a3b8;font-size:13px;padding:8px 0;">No stage notes yet.</div>`;

  document.getElementById("drawer-body").innerHTML = `
    <div class="drawer-kpis">
      <div class="dkpi"><div class="dkpi-label">Progress</div><div class="dkpi-val">${prog}%</div></div>
      <div class="dkpi"><div class="dkpi-label">Done tasks</div><div class="dkpi-val">${done}</div></div>
      <div class="dkpi"><div class="dkpi-label">Open tasks</div><div class="dkpi-val">${open}</div></div>
      <div class="dkpi"><div class="dkpi-label" style="${overdue?"color:#dc2626":""}">Overdue</div><div class="dkpi-val" style="${overdue?"color:#dc2626":""}">${overdue}</div></div>
    </div>

    <div class="stage-pipeline">${pipelineHTML}</div>

    <div class="drawer-section">
      <h4>Customer details</h4>
      <div class="info-grid">
        <div class="info-item"><div class="info-label">POC Name</div><div class="info-val">${c["POC Name"]||"—"}</div></div>
        <div class="info-item"><div class="info-label">POC Email</div><div class="info-val" style="font-size:12px;">${c["POC Email"]||"—"}</div></div>
        <div class="info-item"><div class="info-label">POC Phone</div><div class="info-val">${c["POC Phone"]||"—"}</div></div>
        <div class="info-item"><div class="info-label">Industry</div><div class="info-val">${c["Industry"]||"—"}</div></div>
        <div class="info-item"><div class="info-label">No. of Locations</div><div class="info-val">${locs}</div></div>
        <div class="info-item"><div class="info-label">Risk Level</div><div class="info-val" style="color:${RISK_COLOR[risk]}">${risk}</div></div>
        <div class="info-item"><div class="info-label">Go-Live Date</div><div class="info-val">${fmtDate(c["Go-Live Date"])}</div></div>
        <div class="info-item"><div class="info-label">Contract Start</div><div class="info-val">${fmtDate(c["Contract Start"])}</div></div>
        ${c["On Hold"]==="Yes"?`<div class="info-item" style="background:#fef3c7;"><div class="info-label">Status</div><div class="info-val" style="color:#92400e;">On Hold</div></div>`:""}
        ${c["Churned"]==="Yes"?`<div class="info-item" style="background:#fee2e2;"><div class="info-label">Status</div><div class="info-val" style="color:#991b1b;">Churned · ${fmtDate(c["Churn Date"])}</div></div>`:""}
      </div>
      ${c["Customer Notes"]?`<div style="margin-top:10px;padding:12px;background:#f8fafc;border-radius:8px;font-size:12px;color:#334155;line-height:1.6;">${c["Customer Notes"]}</div>`:""}
    </div>

    <div class="drawer-section">
      <h4>Tasks (${tt.length})</h4>
      <div style="overflow-x:auto;">
        <table class="task-table">
          <thead><tr><th>Task</th><th>Stage</th><th>Status</th><th>Due</th><th>Notes</th></tr></thead>
          <tbody>${taskRows}</tbody>
        </table>
      </div>
    </div>

    <div class="drawer-section">
      <h4>Stage notes (${nn.length})</h4>
      ${notesHTML}
    </div>
  `;

  document.getElementById("overlay").classList.add("open");
  document.getElementById("drawer").classList.add("open");
  document.body.style.overflow="hidden";
}

function closeDrawer(){
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("drawer").classList.remove("open");
  document.body.style.overflow="";
}

// ── Main render ───────────────────────────────────────────────
function render(){
  renderKPIs();
  renderPipeline();
  renderCards();
}

// ── Boot ──────────────────────────────────────────────────────
fetchAll();
// Auto-refresh every 5 minutes
setInterval(fetchAll, 5*60*1000);
</script>
</body>
</html>
