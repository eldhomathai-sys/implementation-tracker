<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Implementation Tracker</title>

<style>
body { font-family: Arial; background:#f4f6f9; margin:0; }
.topbar { background:#1e293b; color:#fff; padding:12px 20px; display:flex; justify-content:space-between; }
.container { padding:20px; }
.card { background:#fff; padding:15px; margin:10px 0; border-radius:8px; border:1px solid #ddd; }
.loading { text-align:center; margin-top:40px; }
</style>
</head>

<body>

<div class="topbar">
  <div>Implementation Tracker</div>
  <div id="status">Loading...</div>
</div>

<div class="container">
  <div id="data" class="loading">Fetching data...</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwosvI8siAqnPCAGCEVLFykTQWwpRUKRLKsrlQRIkwEEzkJG3UfRhy31j1EPtBZqYIP/exec";

async function loadData() {
  try {
    const res = await fetch(API_URL);
    const data = await res.json();

    document.getElementById("status").innerText = "Live";

    render(data.customers || []);
  } catch (e) {
    document.getElementById("status").innerText = "Error";
    document.getElementById("data").innerHTML = "❌ " + e.message;
  }
}

function render(customers) {
  if (!customers.length) {
    document.getElementById("data").innerHTML = "No data found";
    return;
  }

  document.getElementById("data").innerHTML = customers.map(c => `
    <div class="card">
      <b>${c["Account Name"] || "-"}</b><br>
      Stage: ${c["Current Stage"] || "-"}<br>
      Risk: ${c["Risk Level"] || "-"}<br>
      POC: ${c["POC Name"] || "-"}
    </div>
  `).join("");
}

loadData();
</script>

</body>
</html>
